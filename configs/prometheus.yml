global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "producer"
    static_configs:
      - targets: ["producer:8000"]

  - job_name: "inference-worker"
    static_configs:
      - targets: ["inference-worker:8001"]

  - job_name: "db-writer"
    static_configs:
      - targets: ["db-writer:8002"]

  - job_name: "drift-detector"
    static_configs:
      - targets: ["drift-detector:8003"]